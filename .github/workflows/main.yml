name: Traffic Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch clone stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          REPO="dui14/vibe-coding-workflow"

          DATA=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/$REPO/traffic/clones)

          COUNT=$(echo $DATA | jq '.count')

          echo "{\"count\":$COUNT}" > .github/traffic.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .github/workflows/traffic.json
          git commit -m "update traffic stats" || exit 0
          git push
